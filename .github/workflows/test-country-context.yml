name: Test Country Context Build

on:
  workflow_dispatch:

jobs:
  build-test-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openpyxl pdfplumber

      - name: Run builder
        run: python scripts/build_country_context.py

      - name: Show docs folder
        run: |
          echo "===== docs folder ====="
          ls -la docs
          echo "===== test JSON ====="
          cat docs/_country_context_test.json

      - name: Commit test JSON to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/_country_context_test.json
          git diff --cached --quiet || git commit -m "Add test country context JSON"
          git push
