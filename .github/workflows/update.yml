name: Update Visa Wait Data

on:
  workflow_dispatch:
  schedule:
    # 4x/day (UTC). We can tune this later.
    - cron: "7 0 * * *"
    - cron: "7 6 * * *"
    - cron: "7 12 * * *"
    - cron: "7 18 * * *"

permissions:
  contents: write

concurrency:
  group: vwh-data-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Sync with main (before generating files)
        run: |
          set -e
          git config user.name "vwh-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape + build JSON
        env:
          CONTROLLED: "0"
        run: python scrape_build.py

      - name: Commit updated data files (if changed)
        run: |
          set -e
          git config user.name "vwh-bot"
          git config user.email "actions@users.noreply.github.com"

          # Make git more tolerant of large pushes
          git config http.postBuffer 524288000
          git config http.maxRequestBuffer 1048576000
          git config core.compression 0

          # Stage everything the build may generate
          git add \
            docs/us_posts.json \
            docs/us_records.json \
            docs/post_map.json \
            docs/missing_posts.txt \
            docs/missing_posts.json \
            docs/vwh-sitemap-details.xml \
            docs/_cache/post_map_cache.json \
            docs/snapshots \
            docs/daily-raw \
            docs/audit

          # If nothing staged, do nothing
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update dataset (posts, insights, sitemap, snapshots)"

          # Push with retries
          for i in 1 2 3 4 5; do
            echo "Push attempt $i..."
            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi
            echo "Push failed; sleeping before retry..."
            sleep $((i * 10))
          done

          echo "Push failed after retries."
          exit 1
